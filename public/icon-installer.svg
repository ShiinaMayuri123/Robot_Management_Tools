<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- PuduInstaller 机器人图标 -->
  <!-- 天线杆 -->
  <line x1="32" y1="8" x2="32" y2="16" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 天线信号波 -->
  <path d="M26 6 Q29 2 32 6" stroke="#3B82F6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M32 6 Q35 2 38 6" stroke="#3B82F6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="2" fill="#3B82F6"/>
  <!-- 头部外框 -->
  <rect x="12" y="16" width="40" height="36" rx="10" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5"/>
  <!-- 面罩/眼睛区域 -->
  <rect x="18" y="26" width="28" height="12" rx="6" fill="#3B82F6"/>
  <!-- 左眼 -->
  <circle cx="26" cy="32" r="3" fill="white"/>
  <circle cx="27" cy="31.5" r="1.2" fill="#1E3A5F"/>
  <!-- 右眼 -->
  <circle cx="38" cy="32" r="3" fill="white"/>
  <circle cx="39" cy="31.5" r="1.2" fill="#1E3A5F"/>
  <!-- 嘴巴 -->
  <rect x="27" y="42" width="10" height="3" rx="1.5" fill="#9CA3AF"/>
  <!-- 右下角小箭头光标 -->
  <g transform="translate(44, 44)">
    <polygon points="0,0 0,12 4,9 7,14 9,13 6,8 10,6" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.5"/>
  </g>
</svg>
