<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 32" fill="none">
  <!-- PUDU Logo: 几何H图标 + PUDU文字 -->
  <g fill="currentColor">
    <!-- 左竖线 -->
    <rect x="2" y="4" width="5" height="24" rx="1"/>
    <!-- 右竖线 -->
    <rect x="17" y="4" width="5" height="24" rx="1"/>
    <!-- 上横线 -->
    <rect x="7" y="6" width="10" height="5" rx="1"/>
    <!-- 下横线 -->
    <rect x="7" y="21" width="10" height="5" rx="1"/>
    <!-- 中心方块 -->
    <rect x="9" y="13" width="6" height="6" rx="1"/>
    <!-- 文字 PUDU -->
    <text x="30" y="24" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="currentColor">PUDU</text>
  </g>
</svg>
